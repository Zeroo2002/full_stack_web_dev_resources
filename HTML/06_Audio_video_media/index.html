<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video</title>
</head>
<body>
    
    <div>
            <video src="projectscratch.mp4" controls poster="roller_coaster.jpeg" width="500px" autoplay muted></video>
