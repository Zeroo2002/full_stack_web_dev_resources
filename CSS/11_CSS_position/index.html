<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .parent{
            padding: 34px;
            margin: 43px;
            width: 90vw;
            height: 1134px;
            border: 2px solid black;
            position: absolute;
        }

        .box {
            width: 80vw;
            height: 153px;
            border: 2px solid black;
            margin: 5px;
            padding: 5px;
        }


        .box1 {
            background-color: cyan;
            /* position: absolute;
            top: 0px;
            left: 24px; */
            position: sticky;
            top: 0px;
            height: 50px;
        }

        .box2 {
            background-color: rgb(255, 255, 81);
            /* position: relative;
            bottom: 33px;
            left: 30px; */
        }

        .box3 {
            background-color: bisque;
            position: fixed;
            bottom: 30px;
            left: 6vw;
        }

        .box4 {
            background-color: purple;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>

<!-- 

Note: transform, filter and perspective properties can also make an element appear as positioned

-->
