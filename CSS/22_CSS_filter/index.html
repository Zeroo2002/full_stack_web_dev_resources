<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        .img1{
            filter: brightness(1.5);
        }
        .img2{
            filter: grayscale(50%);
        }
        .img3{
            filter: sepia();
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="https://png.pngtree.com/thumb_back/fh260/background/20240518/pngtree-nature-beautiful-background-hd-image_15796886.jpg" alt="">
        <img class="img2" src="https://png.pngtree.com/thumb_back/fh260/background/20240518/pngtree-nature-beautiful-background-hd-image_15796886.jpg" alt="">
        <img class="img3" src="https://png.pngtree.com/thumb_back/fh260/background/20240518/pngtree-nature-beautiful-background-hd-image_15796886.jpg" alt="">
    </div>
</body>
</html>
