<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transforms</title>
    <style>

        .container{
            width: 100vw;
            height: 80vh;
            margin: 50px;
            border: 2px solid red;
        }
        .box{
            width: 50px;
            height: 50px;
            border: 2px solid black;
            background-color: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
            /* transform: rotate(40deg); */
            transform: rotateX(70deg);
            transform: scale(1.5);
            /* transform: skew(15deg); */
            transform: translate(34px);


            /* multiple tranform */
            /* transform: translate(34px) scale(1.5) skew(15deg); */
            transform-origin:(0%, 0%) ;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
