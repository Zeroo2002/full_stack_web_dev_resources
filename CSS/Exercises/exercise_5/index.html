<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformation Transition Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="blue translateX">
                <span>TranslateX</span>
            </div>
        </div>
        <div class="box">
            <div class="blue translateY">
                <span>TranslateY</span>
            </div>
        </div>
        <div class="box">
            <div class="blue translate">
                <span>Translate</span>
            </div>
        </div>
        <div class="box">
            <div class="blue scaleX">
                <span>ScaleX</span>
            </div>
        </div>
        <div class="box">
            <div class="blue scaleY">
                <span>ScaleY</span>
            </div>
        </div>
        <div class="box">
            <div class="blue scale">
                <span>Scale</span>
            </div>
        </div>
        <div class="box">
            <div class="blue rotationX">
                <span>RotationX</span>
            </div>
        </div>
        <div class="box">
            <div class="blue rotationY">
                <span>RotationY</span>
            </div>
        </div>
        <div class="box">
            <div class="blue rotation">
                <span>Rotation</span>
            </div>
        </div>
        <div class="box">
            <div class="blue skewX">
                <span>SkewX</span>
            </div>
        </div>
        <div class="box">
            <div class="blue skewY">
                <span>SkewY</span>
            </div>
        </div>
        <div class="box">
            <div class="blue skew">
                <span>Skew</span>
            </div>
        </div>
        <div class="box">
            <div class="blue matrix">
                <span>Matrix</span>
            </div>
        </div>
        <div class="box">
            <div class="blue matrix3d">
                <span>Matrix3D</span>
            </div>
        </div>
        <div class="box">
            <div class="blue translate3d">
                <span>Translate3D</span>
            </div>
        </div>
    </div>
</body>
</html>
