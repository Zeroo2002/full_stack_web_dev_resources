<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Edits Nav Bar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="offer">
        <ul>
            <li>UE Core & Enterprise Subscriptions: </li>
            <li> Get </li>
            <li class="bold"> 10% Off </li>
            <li> on your second year </li>
            <li>
                <img class="info" src="information.png" alt="" width="13px">
            </li>
        </ul>
        
        <span class="buy bold"> Buy now →</span>
    </div>
    <div class="navbar">
        <div class="nav">
            <div class="icon">
                <img src="UE_Site-Logo.png" alt="" width="150px">
            </div>

            <div class="product">
                <ul>
                    <li>
                    <p>Product</p>
                    <img src="down-arrow.png" alt="" width="20px" height="20px">
                </li>
                <li>Buy</li>
                <li>Renew</li>
                <li>
                    <p>Support</p>
                    <img src="down-arrow.png" alt="" width="20px" height="20px">
                </li>
                <li>
                    <p>Learn</p>
                    <img src="down-arrow.png" alt="" width="20px" height="20px">
                </li>
                <li>
                    <p>Company</p>
                    <img src="down-arrow.png" alt="" width="20px" height="20px">
                </li>
                </ul>
            </div>

            <div class="options">
                <ul>
                    <li>
                        <div class="download">
                            <p>Download</p>
                        </div>
                    </li>
                    <li>
                        <img src="globe.png" alt="" width="15px">
                        <Span>English</Span>
                    </li>
                    <li><img src="search.png" alt="" width="15px"></li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
