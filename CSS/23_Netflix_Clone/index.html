<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India – Watch Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pre">
        <div class="nav">
            <ul>
                <li><span class="Netflix_logo">
                        <img src="Netflix_logo.png" alt="" width="150px">
                    </span></li>
                <li>
                    <button class="language">
                        <span><img src="nav/language.svg" alt=""></span>
                        <span>English</span>
                        <span><img src="nav/dropdown_icon.svg" alt=""></span></button>
                    <button class="sign_in bg_change">Sign In</button>
                </li>
            </ul>
        </div>
        <div class="pre_content">
            <div class="pre_mid_content">
                <span class="big_bold">Unlimited movies, shows, and more</span>
            <!-- <span class="big_bold"></span> -->
            <span class="small_bold">Starts at ₹149. Cancel at any time.</span>
            <span class="ready">Ready to watch? Enter your email to create or restart your membership.</span>
            <div class="email">
                <input type="text" placeholder="">
                <button class="get_started bg_change">
                    <span>Get started</span>
                    <span><img src="pre_content/right_arrow.svg" alt=""></span>
                </button>
            </div>
            </div>
        </div>
        <div class="cover"></div>
    </div>
    <div class="divider">
        <div class="line"></div>
    </div>
    <div class="cards"></div>
    <div class="faq"></div>
    <div class="footer"></div>
</body>

</html>
