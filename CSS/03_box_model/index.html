<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .box{
            background-color: cyan;
        }

        .box1{
            color: red;
            padding: 10px;
            border: 2px solid red;
            margin: 25px;
            height: 200px;
            box-sizing: border-box;  /* read about this in notes*/
        }

        .box2{
            color: black;
            padding: 10px;
            border: 2px solid rgb(0, 0, 0);
            margin: 25px;
            height: 200px;
            box-sizing: border-box;  /* read about this in notes*/
        }
    </style>
</head>
<body>
    <div class="box box1">I am box1</div>
    <div class="box box2">I am box2</div>
</body>
</html>
